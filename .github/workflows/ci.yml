name: ci

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  offline-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install host dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-host.txt

      - name: Compile Python files
        run: |
          python - <<'PY'
          import pathlib

          root = pathlib.Path("jlc-k230-lushan-pi")
          files = sorted(root.rglob("*.py"))
          for path in files:
              compile(path.read_text(encoding="utf-8"), str(path), "exec")
          print("PY_SYNTAX_OK files=%d" % len(files))
          PY

      - name: Validate skill package
        run: python jlc-k230-lushan-pi/scripts/validate_skill.py jlc-k230-lushan-pi

      - name: Validate through repository entrypoint
        shell: pwsh
        run: ./tools/validate.ps1

      - name: Run host-side unit tests
        run: python -m unittest discover -s tests
